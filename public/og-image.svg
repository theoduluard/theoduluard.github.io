<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#3b82f6"/>
      <stop offset="50%"  style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowName" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <circle cx="180" cy="140" r="380" fill="#3b82f6" opacity="0.07"/>
  <circle cx="1080" cy="520" r="300" fill="#22d3ee" opacity="0.05"/>
  <circle cx="950"  cy="120" r="200" fill="#6366f1" opacity="0.04"/>

  <!-- Border frame -->
  <rect x="28" y="28" width="1144" height="574" rx="18" fill="none" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ── TD Monogram ── -->
  <rect x="76" y="68" width="52" height="52" rx="11" fill="#2563eb" filter="url(#glow)"/>
  <text x="102" y="95" dominant-baseline="central" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-weight="800" font-size="20" fill="white">TD</text>

  <!-- ── Status badge ── -->
  <rect x="76" y="148" width="326" height="34" rx="17" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <circle cx="98" cy="165" r="5.5" fill="#fb923c" opacity="0.9"/>
  <text x="113" y="170" font-family="Inter, Arial, sans-serif" font-size="13.5" fill="#cbd5e1" dominant-baseline="central">En alternance @ Horizon Trading Solutions</text>

  <!-- ── Name ── -->
  <text x="76" y="293"
        font-family="Inter, Arial, sans-serif" font-weight="800" font-size="104"
        fill="white" letter-spacing="-4">Théo</text>
  <text x="76" y="403"
        font-family="Inter, Arial, sans-serif" font-weight="800" font-size="104"
        fill="url(#nameGrad)" letter-spacing="-4" filter="url(#glowName)">DULUARD</text>

  <!-- ── Subtitle ── -->
  <text x="76" y="450"
        font-family="Inter, Arial, sans-serif" font-weight="500" font-size="24"
        fill="#94a3b8">Analyste-Développeur Logiciel · Java &amp; React</text>

  <!-- ── Tech stack badges ── -->
  <!-- Java -->
  <rect x="76"  y="482" width="88"  height="32" rx="7" fill="rgba(67,20,7,0.55)"   stroke="rgba(154,52,18,0.45)"  stroke-width="1"/>
  <text x="120" y="498" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#fb923c">Java</text>

  <!-- Spring Boot -->
  <rect x="174" y="482" width="126" height="32" rx="7" fill="rgba(5,46,22,0.55)"   stroke="rgba(22,101,52,0.45)"  stroke-width="1"/>
  <text x="237" y="498" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#4ade80">Spring Boot</text>

  <!-- React -->
  <rect x="310" y="482" width="88"  height="32" rx="7" fill="rgba(8,51,68,0.55)"   stroke="rgba(14,116,144,0.45)" stroke-width="1"/>
  <text x="354" y="498" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#22d3ee">React</text>

  <!-- TypeScript -->
  <rect x="408" y="482" width="114" height="32" rx="7" fill="rgba(23,37,84,0.55)"  stroke="rgba(29,78,216,0.45)"  stroke-width="1"/>
  <text x="465" y="498" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#60a5fa">TypeScript</text>

  <!-- Docker -->
  <rect x="532" y="482" width="94"  height="32" rx="7" fill="rgba(23,37,84,0.55)"  stroke="rgba(29,78,216,0.45)"  stroke-width="1"/>
  <text x="579" y="498" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#60a5fa">Docker</text>

  <!-- PostgreSQL -->
  <rect x="636" y="482" width="124" height="32" rx="7" fill="rgba(30,27,75,0.55)"  stroke="rgba(67,56,202,0.45)"  stroke-width="1"/>
  <text x="698" y="498" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#a5b4fc">PostgreSQL</text>

  <!-- GitLab CI -->
  <rect x="770" y="482" width="100" height="32" rx="7" fill="rgba(67,20,7,0.55)"   stroke="rgba(154,52,18,0.45)"  stroke-width="1"/>
  <text x="820" y="498" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#fb923c">GitLab CI</text>

  <!-- ── URL bottom-right ── -->
  <text x="1124" y="574" text-anchor="end"
        font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">portfolio.theoduluard.fr</text>
</svg>
